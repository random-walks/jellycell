[project]
name = "showcase-churn"

[paths]
notebooks = "notebooks"
data = "data"
artifacts = "artifacts"
site = "site"
manuscripts = "manuscripts"
cache = ".jellycell/cache"

[run]
kernel = "python3"
subprocess = true
timeout_seconds = 600

[viewer]
host = "127.0.0.1"
port = 5180

[journal]
enabled = true
path = "journal.md"
